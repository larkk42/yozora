<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#080818"/>
  <defs>
    <radialGradient id="g1" cx="70%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#080818" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#080818" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#g1)"/>
  <rect width="512" height="512" rx="100" fill="url(#g2)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="3" fill="white" opacity="0.8"/>
  <circle cx="150" cy="100" r="2" fill="white" opacity="0.6"/>
  <circle cx="380" cy="70" r="3" fill="white" opacity="0.9"/>
  <circle cx="430" cy="130" r="2" fill="white" opacity="0.5"/>
  <circle cx="60" cy="200" r="2" fill="white" opacity="0.7"/>
  <circle cx="450" cy="350" r="3" fill="white" opacity="0.6"/>
  <circle cx="100" cy="420" r="2" fill="white" opacity="0.5"/>
  <circle cx="400" cy="430" r="2" fill="white" opacity="0.8"/>
  <!-- 夜 character -->
  <text x="256" y="310" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="220" font-weight="900"
    fill="none" stroke="url(#grad)" stroke-width="2" text-anchor="middle">
    <defs>
      <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#c084fc"/>
        <stop offset="100%" stop-color="#f9a8d4"/>
      </linearGradient>
    </defs>
  </text>
  <text x="256" y="310" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="220" font-weight="900"
    text-anchor="middle" fill="#c084fc">夜</text>
  <!-- Gradient overlay on text -->
  <text x="256" y="310" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="220" font-weight="900"
    text-anchor="middle" fill="#f9a8d4" opacity="0.4">夜</text>
</svg>
